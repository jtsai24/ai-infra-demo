---
- name: Deploy and submit NCCL single GPU job
  hosts: controller
  become: false

  tasks:
    - name: Create logs directory
      file:
        path: /home/user/logs
        state: directory
        mode: '0755'

    - name: Create jobs directory
      file:
        path: /home/user/jobs
        state: directory
        mode: '0755'

    - name: Copy nccl_1_single_gpu job script
      copy:
        src: ../jobs/nccl_1_single_gpu.sh
        dest: /home/user/jobs/nccl_1_single_gpu.sh
        mode: '0755'

    - name: Submit nccl_1_single_gpu job
      command: sbatch /home/user/jobs/nccl_1_single_gpu.sh
      register: submit

    - name: Print job ID
      debug:
        msg: "{{ submit.stdout }}"
