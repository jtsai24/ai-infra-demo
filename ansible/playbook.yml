---
- name: Configure H100 GPU cluster nodes
  hosts: all
  become: true

  tasks:
    # --- Swap ---
    - name: Disable swap immediately
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Remove swap entries from /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '# \1'

    - name: Set vm.swappiness=0 permanently
      sysctl:
        name: vm.swappiness
        value: '0'
        state: present
        reload: yes

    # --- Packages ---
    - name: Install RDMA and utility packages
      apt:
        name:
          # RDMA packages — installed but not active on 1-GPU Nebius VMs (Virtio NIC, no SR-IOV).
          # Will be useful when provisioning 8-GPU InfiniBand nodes for the final IB benchmark session.
          - rdma-core
          - ibverbs-utils
          - perftest
          - numactl
          - htop
          - nvtop
          # Slurm and dependencies
          - slurm-wlm
          - munge
          - python3-pip
        state: present
        update_cache: yes

    # --- Kernel modules ---
    - name: Load RDMA kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - ib_uverbs
        - ib_core

    - name: Persist RDMA kernel modules across reboots
      lineinfile:
        path: /etc/modules-load.d/rdma.conf
        line: "{{ item }}"
        create: yes
      loop:
        - ib_uverbs
        - ib_core

    # --- Hostnames ---
    # Set stable hostnames (node1/node2) so slurm.conf is consistent across reprovisioning.
    # Nebius default hostnames (computeinstance-e00xyz...) change on every terraform apply.
    - name: Set hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Update /etc/hosts with new hostname
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1   {{ inventory_hostname }}"

    - name: Add cluster nodes to /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ hostvars[item]['ansible_default_ipv4']['address'] }}   {{ item }}"
      loop:
        - node1
        - node2

    # --- Munge (Slurm inter-node authentication) ---
    # Munge requires an identical key on all nodes. We generate it once on node1,
    # fetch it back to the Ansible control machine, then push it to all nodes.
    - name: Generate munge key on node1
      command: /usr/sbin/create-munge-key
      args:
        creates: /etc/munge/munge.key  # idempotent — skips if key already exists
      when: inventory_hostname == 'node1'

    - name: Fetch munge key from node1 to control machine
      fetch:
        src: /etc/munge/munge.key
        dest: /tmp/munge.key
        flat: yes
      when: inventory_hostname == 'node1'

    - name: Copy munge key to all nodes
      copy:
        src: /tmp/munge.key
        dest: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: '0400'

    - name: Enable and restart munge (ensures new key is loaded)
      service:
        name: munge
        state: restarted
        enabled: yes

    # --- Slurm configuration ---
    - name: Create slurm log directory
      file:
        path: /var/log/slurm
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Create slurmd spool directory
      file:
        path: /var/spool/slurmd
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Create slurm config directory
      file:
        path: /etc/slurm
        state: directory
        mode: '0755'

    - name: Deploy slurm.conf from template
      template:
        src: templates/slurm.conf.j2
        dest: /etc/slurm/slurm.conf
        owner: root
        group: root
        mode: '0644'

    - name: Deploy gres.conf
      copy:
        dest: /etc/slurm/gres.conf
        content: "Name=gpu Type=h100 File=/dev/nvidia[0-7]\n"
        owner: root
        group: root
        mode: '0644'

    - name: Start slurmctld on node1
      service:
        name: slurmctld
        state: restarted
        enabled: yes
      when: inventory_hostname == 'node1'

    - name: Start slurmd on all nodes
      service:
        name: slurmd
        state: restarted
        enabled: yes

    # --- RDMA device check ---
    - name: Run ibv_devices to confirm RDMA devices
      command: ibv_devices
      register: ibv_output
      changed_when: false

    - name: Print ibv_devices output
      debug:
        msg: "{{ ibv_output.stdout_lines }}"
