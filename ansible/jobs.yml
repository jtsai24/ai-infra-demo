---
- name: Deploy and submit Slurm jobs
  hosts: controller
  become: false

  tasks:
    - name: Create logs directory
      file:
        path: /home/user/logs
        state: directory
        mode: '0755'

    - name: Create jobs directory
      file:
        path: /home/user/jobs
        state: directory
        mode: '0755'

    - name: Copy hello job script
      copy:
        src: ../jobs/hello.sh
        dest: /home/user/jobs/hello.sh
        mode: '0755'

    - name: Submit hello job
      command: sbatch /home/user/jobs/hello.sh
      register: hello_submit

    - name: Print job submission result
      debug:
        msg: "{{ hello_submit.stdout }}"

    - name: Copy nccl_allreduce job script
      copy:
        src: ../jobs/nccl_allreduce.sh
        dest: /home/user/jobs/nccl_allreduce.sh
        mode: '0755'

    - name: Submit nccl_allreduce job
      command: sbatch /home/user/jobs/nccl_allreduce.sh
      register: nccl_submit

    - name: Print nccl job submission result
      debug:
        msg: "{{ nccl_submit.stdout }}"