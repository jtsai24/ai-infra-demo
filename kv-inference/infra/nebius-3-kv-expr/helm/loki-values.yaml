loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  auth_enabled: false
  useTestSchema: true

# Nebius names the DNS service "coredns" not "kube-dns".
# The Loki gateway nginx config hardcodes kube-dns as the resolver — override it.
gateway:
  nginxConfig:
    resolver: coredns.kube-system.svc.cluster.local

deploymentMode: SingleBinary

singleBinary:
  replicas: 1

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0